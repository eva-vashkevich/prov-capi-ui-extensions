---
capa:
  description: Provision new CAPA (Cluster API Provider AWS) clusters.
  label: CAPI AWS
  clusterConfig:
      title: CAPI Cluster Configuration
      generalConfiguration:
        title: General Configuration
      region:
        label: Region
        placeholder: Select a region
      network:
        title: Network configuration
        label: Network
        placeholder: Select a network
        strategy:
          label: Strategy
          managed: 
            label: Managed network
            description: CAPA will automatically create a completely new, fully configured VPC for this cluster (including Subnets and Security Groups).
          unmanaged: 
            label: Unmanaged network (manual configuration)
            description: Bring your own AWS Infrastructure. Select an existing VPC and Subnets. By default, CAPA will still create Security Groups and a Control Plane Load Balancer.
        unmanagedSettings:
          title: Unmanaged Network Settings
        enableIpv6: Enable IPv6
        networkSecurity:
          title: Network Security
        overrideBanners:
          controlPlaneOverridden: The control plane security group has been manually overridden with an existing security group. Additional ingress rules can only be applied to security groups created and managed by CAPA.
          nodeOverridden: The node security group has been manually overridden with an existing security group. Additional ingress rules can only be applied to the security groups created and managed by CAPA.
          nodeOverriddenCni: The node security group has been manually overridden with an existing security group. The CNI ingress rules will not apply, but they will still apply to the control plane security group that CAPA will create.
          controlPlaneOverriddenCni: The control plane security group has been manually overridden with an existing security group. The CNI ingress rules will not apply, but they will still apply to the node security group that CAPA will create.
          bothOverridden: Both node and control plane security groups have been overridden with existing security groups. CNI ingress rules can only be applied to security groups created and managed by CAPA.
        vpc:
          label: VPC
          description: VPC to use with your cluster resources.
          cidrBlock: 
            label: VPC CIDR Block
            description: Configure a CIDR block for the CAPA-created VPC, divided between subnets.
            placeholder: 10.0.0.0/16
        subnets:
          label: Subnets
          description: In unmanaged network mode, at least one subnet must be selected.
        securityGroups:
          label: Security Group Overrides
          description: Select existing security groups instead of using the CAPA controller to automatically create new ones. Only applies when using an unmanaged network.
          selectVpc: Select a VPC first
          roles:
            node: Workload nodes
            controlplane: Control plane nodes
            apiserver-lb: Kubernetes API server load balancer
            lb: Load balancer
          role: Role
          securityGroupId: Security Group ID
          addOverride: Add SG override
        additionalControlPlaneIngressRules:
          description: Set ingress rules for the control plane, used in addition to rules defined by CAPA. The source of each rule may be either CIDR blocks, security groups, or NAT gateways.
          label: Additional Control Plane Ingress Rules
          ruleSectionTitlePrefix: Control Plane
        additionalNodeIngressRules:
          description: Set ingress rules for the worker nodes, used in addition to rules defined by CAPA. The source of each rule may be either CIDR blocks, security groups, or NAT gateways.
          label: Additional Node Ingress Rules
          ruleSectionTitlePrefix: Node
        cniProviderBanner: "This cluster is configured to use the {cni} CNI. To change the CNI plugin, go to the <a href=\"#basic\" aria-label='CNI plugin setting in the Basic cluster configuration tab'>Basic RKE2 Cluster Configuration Section</a>."
        cniIngressRules:
          description: CNI rules apply to both node and control plane security groups. The source for each rule will be set to the node and control plane security groups.
          label: CNI Ingress Rules
          ruleSectionTitlePrefix: CNI
        ingressRules:
          description: Description
          protocol: Protocol
          fromPort: From Port
          toPort: To Port
          cidrBlocks: CIDR Blocks
          ipv6CidrBlocks: IPv6 CIDR Blocks
          cidrBlocksPlaceholder: "e.g., 10.0.0.0/16, 192.168.1.0/24"
          ipv6CidrBlocksPlaceholder: "e.g., 2001:db8::/32, fd00::/8"
          natGatewaysIPsSource: Use NAT Gateway IPs as Source
          sourceSecurityGroupIDs: Source Security Group IDs
          sourceSecurityGroupRoles: Source Security Group Roles
          addRule: Add Rule
          deleteRule: Delete
          ruleTitle: '{titlePrefix} Rule {index}'
          protocols:
            all: All
            tcp: TCP
            udp: UDP
            icmp: ICMP
            icmpv6: ICMPv6
            ipInIp: IP in IP
            esp: ESP
      sshKeyName:
        label: SSH Key Name
        noneLabel: None
        description: A default SSH key to attach to instances.
  machineConfig:
    instanceConfiguration:
      title: Instance configuration
      description: Configuration options for the EC2 instance.
      instanceType:
        label: Instance type
      subnet:
        label: Subnet
      advanced:
        title: Advanced instance settings
        machineImage:
          label: Machine image (AMI ID)
          placeholder: 'Default: A recent Ubuntu LTS'
        iamInstanceProfileName:
          label: IAM Instance Profile Name
        instanceMetadataOptions:
          httpTokens:
            label: Instance metadata HTTP Tokens
            description: The state of token usage for your instance metadata requests.
            options:
              required: Required
              optional: Optional
    storage:
      title: Storage
      description: Configuration options for the root storage volume.
      rootVolume:
        encrypted:
          label: Encrypted volume
        encryptionKey:
          label: Encryption key
          placeholder: KMS key id or ARN to encrypt the volume
        iops:
          label: IOPS
        size:
          label: Root Disk Size
        type:
          label: Volume type
      advanced:
        title: Additional volumes (non-root)
        additionalVolumes:
          add: Add volume
          deviceName:
            label: Device name
          type:
            label: Volume type
          size:
            label: Disk size
    advanced:
      title: Advanced machine settings
      cloudInit:
        title: Cloud Init
        disable:
          label: Skip secrets manager (insecure)
      securityGroup:
        label: Security group
        options:
          standard: "Standard: Automatically create and use a 'rancher-nodes' security group"
          existing: Choose one or more existing security groups
      marketType:
        title: Market type
        description: This specifies the type of market for the EC2 instance and the max price if applies.
        options:
          onDemand: On Demand
          spot: Spot
          block: Capacity Block
        price:
          label: Max price
          placeholder: 'Default: 0.50'
          description: Defines the maximum price the user is willing to pay for Spot VM instances.
      tags:
        title: Additional tags
        description: Tags that CAPA will add to managed AWS resources, in addition to the usual ones it adds.
        add: Add tag
  errors:
    creatingInfrastructureClusterConfig: "Error creating infrastructure cluster config: {error}"
    removingOldMachineConfig: "Error removing old machine config: {error}"
    savingMachineConfig: "Error saving machine config: {error}"
    savingInfrastructureCluster: "Error saving infrastructure cluster: {error}"
    missingAdditionalManifest: RKE Config is missing additional manifest
    invalidCloudProviderName: Cloud provider must be set to External when using CAPA
    regionRequired: Region is required.
    vpcRequired: VPC is required
    subnetRequired: At least one subnet is required
    invalidIpv4Cidr: Invalid IPv4 CIDR format
    invalidIpv6Cidr: Invalid IPv6 CIDR format
    vpcCidrBlock: VPC CIDR block must be a valid CIDR (e.g., 10.0.0.0/16).
    vpcIdRequired: A VPC must be selected when using an unmanaged network.
    subnetsRequired: At least one subnet must be selected when using an unmanaged network.
    ingressCidrBlocks: '"{value}" is not a valid IPv4 CIDR block.'
    ipv6VpcRequired: The selected VPC does not support IPv6. Choose a VPC with an associated IPv6 CIDR block.
    ipv6SubnetsRequired: One or more selected subnets do not support IPv6. All subnets must have an IPv6 CIDR association when IPv6 is enabled.
    fetchingRegions: "Error fetching regions: {error}"
    fetchingSshKeys: "Error fetching SSH keys: {error}"
    fetchingVpcs: "Error fetching VPCs: {error}"
    fetchingSubnets: "Error fetching subnets: {error}"
    fetchingSecurityGroups: "Error fetching security groups: {error}"
    fetchingCloudCredential: "Error fetching Rancher Cloud Credential details: {error}"
    missingIdentityRef: "The selected cloud credential must contain a \"{annotation}\" annotation pointing to an AWSClusterStaticIdentity"

cluster:
  provider:
    awsmachinetemplate: Cluster API Provider AWS


